<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>离线状态</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f1e8;
        color: #182126;
        font-family: "Segoe UI", sans-serif;
      }

      main {
        max-width: 22rem;
        padding: 2rem;
        border-radius: 1.5rem;

        box-shadow: 0 20px 50px rgba(24, 33, 38, 0.12);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #60717d;
      }

  <body>
    <main>
      <h1>当前处于离线状态</h1>
      <p>应用骨架会继续可用。等网络恢复后，页面资源会自动同步更新。</p>
    </main>
  </body>
